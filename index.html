<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | AI Gear Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e24;
            color: #e2e8f0;
            text-align: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #f97316;
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 375px;
            margin: 0 auto;
            background-color: #16161a;
            border: 4px solid #f97316;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        #webcam-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
        }

        /* Overlay canvas for drawing real-time tracking boxes */
        #detection-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            transform: scaleX(-1); /* Match mirrored video */
        }

        .log-panel {
            max-width: 500px;
            margin: 25px auto 0 auto;
            padding: 15px 20px;
            background-color: #272730;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            text-align: left;
        }

        #status-output {
            font-size: 1.2rem;
            font-weight: 600;
            color: #38bdf8;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@latest"></script>
</head>
<body>

    <div class="container">
        <h1>GearShare AI Gear Detector</h1>
        <p class="subtitle">Open-source object detection pipeline for peer-to-peer asset verification.</p>

        <div class="video-container">
            <video id="webcam-feed" autoplay playsinline muted></video>
            <canvas id="detection-canvas"></canvas>
        </div>

        <div class="log-panel">
            <div id="status-output">Downloading neural network layers from TensorFlow...</div>
        </div>
    </div>

    <script type="text/javascript">
        let model;
        const videoElement = document.getElementById('webcam-feed');
        const canvasElement = document.getElementById('detection-canvas');
        const ctx = canvasElement.getContext('2d');
        const statusDisplay = document.getElementById("status-output");

        window.addEventListener('DOMContentLoaded', initializeAI);

        async function initializeAI() {
            try {
                // Load the COCO-SSD model directly from TensorFlow's open-source library CDN
                model = await cocoSsd.load();
                statusDisplay.innerText = "Model loaded. Activating webcam matrix...";

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 500, height: 375, facingMode: "user" }, 
                    audio: false 
                });
                videoElement.srcObject = stream;

                videoElement.onloadedmetadata = () => {
                    // Match canvas coordinate matrix dimensions to visual video dimensions
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                    
                    statusDisplay.innerText = "System online. Scan your mouse, phone, or laptop.";
                    predictLoop();
                };
            } catch (error) {
                statusDisplay.innerText = "Hardware Error: Please check camera permissions.";
                statusDisplay.style.color = "#ef4444";
                console.error(error);
            }
        }

        async function predictLoop() {
            // Run object detection frame evaluation
            const predictions = await model.detect(videoElement);
            
            // Clear previous frames bounding lines
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            let detectedText = "Scanning workspace for gear...";

            predictions.forEach(prediction => {
                // Filter models to display target categories relevant to GearShare hardware marketplace
                const targetClasses = ['cell phone', 'laptop', 'mouse', 'keyboard', 'book'];
                
                if (targetClasses.includes(prediction.class)) {
                    detectedText = `Verified Gear Match: ${prediction.class.toUpperCase()} (${Math.round(prediction.score * 100)}%)`;
                    
                    // Extract coordinates for object placement
                    const [x, y, width, height] = prediction.bbox;
                    
                    // Draw bounding box outlines over detected items
                    ctx.strokeStyle = '#f97316'; // GearShare Orange
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x, y, width, height);
                    
                    // Draw small label background box
                    ctx.fillStyle = '#f97316';
                    ctx.fillRect(x, y - 25, ctx.measureText(prediction.class).width + 20, 25);
                    
                    // Print classification text label over bounding line
                    ctx.fillStyle = '#1e1e24';
                    ctx.font = 'bold 14px Segoe UI';
                    ctx.fillText(prediction.class.toUpperCase(), x + 10, y - 7);
                }
            });

            statusDisplay.innerText = detectedText;
            
            // Repeat tracking operations recursively on next layout refresh handle tick
            window.requestAnimationFrame(predictLoop);
        }
    </script>
</body>
</html>
