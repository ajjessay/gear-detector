<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | Gear Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e24;
            color: #e2e8f0;
            text-align: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #f97316;
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 375px;
            margin: 0 auto;
            background-color: #16161a;
            border: 4px solid #f97316;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        #webcam-container {
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .log-panel {
            max-width: 500px;
            margin: 25px auto 0 auto;
            padding: 15px 20px;
            background-color: #272730;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            text-align: left;
        }

        .log-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 4px;
        }

        #status-output {
            font-size: 1.2rem;
            font-weight: 600;
            color: #38bdf8;
        }

        .prediction-list {
            max-width: 500px;
            margin: 20px auto 0 auto;
            background: #16161a;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        .prediction-row {
            margin-bottom: 10px;
        }

        .prediction-row:last-child {
            margin-bottom: 0;
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .progress-bar-bg {
            width: 100%;
            background-color: #272730;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #f97316;
            width: 0%;
            transition: width 0.1s ease;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>GearShare Gear Detector</h1>
        <p class="subtitle">AI verification module for peer-to-peer student equipment sharing.</p>

        <div class="video-wrapper">
            <div id="webcam-container"></div>
        </div>

        <div class="log-panel">
            <div class="log-title">System Status Log</div>
            <div id="status-output">Booting engine models...</div>
        </div>

        <div id="label-container" class="prediction-list"></div>
    </div>

    <script type="text/javascript">
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/vzm7A_O68/"; 

        let model, webcam, labelContainer, maxPredictions;

        window.addEventListener('DOMContentLoaded', initializeApp);

        async function initializeApp() {
            const statusDisplay = document.getElementById("status-output");
            
            try {
                statusDisplay.innerText = "Loading GearShare model layers...";
                
                model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                statusDisplay.innerText = "Connecting camera hardware...";
                
                // FIXED: Changed setup parameters to pass a generic true fallback object
                webcam = new tmImage.Webcam(500, 375, true); 
                
                // Request webcam with universal fallback constraints
                await webcam.setup({ facingMode: "user" }); 
                await webcam.play();
                
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                
                for (let i = 0; i < maxPredictions; i++) {
                    const row = document.createElement("div");
                    row.className = "prediction-row";
                    row.innerHTML = `
                        <div class="label-text">
                            <span class="class-name">--</span>
                            <span class="class-percentage">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill"></div>
                        </div>
                    `;
                    labelContainer.appendChild(row);
                }

                statusDisplay.innerText = "System online. Ready to detect gear.";
                window.requestAnimationFrame(updateFrameLoop);

            } catch (error) {
                statusDisplay.innerText = "Error: Click the lock icon in your URL bar to allow camera access.";
                statusDisplay.style.color = "#ef4444";
                console.error(error);
            }
        }

        async function updateFrameLoop() {
            webcam.update(); 
            await processCurrentFrame();
            window.requestAnimationFrame(updateFrameLoop);
        }

        async function processCurrentFrame() {
            const predictions = await model.predict(webcam.canvas);
            const statusDisplay = document.getElementById("status-output");
            
            let topConfidence = 0;
            let currentActiveMatch = "Scanning workspace for gear...";

            for (let i = 0; i < maxPredictions; i++) {
                const name = predictions[i].className;
                const score = predictions[i].probability;
                
                if (score > topConfidence && score > 0.4) {
                    topConfidence = score;
                    currentActiveMatch = `Verified Gear Match: ${name.toUpperCase()}`;
                }

                const row = labelContainer.childNodes[i];
                row.querySelector(".class-name").innerText = name;
                row.querySelector(".class-percentage").innerText = `${Math.round(score * 100)}%`;
                row.querySelector(".progress-bar-fill").style.width = `${score * 100}%`;
            }

            statusDisplay.style.color = "#38bdf8";
            statusDisplay.innerText = currentActiveMatch;
        }
    </script>
</body>
</html>
