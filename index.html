<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | Gear Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e24;
            color: #e2e8f0;
            text-align: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #f97316;
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 375px;
            margin: 0 auto;
            background-color: #16161a;
            border: 4px solid #f97316;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        #webcam-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .log-panel {
            max-width: 500px;
            margin: 25px auto 0 auto;
            padding: 15px 20px;
            background-color: #272730;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            text-align: left;
        }

        .log-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 4px;
        }

        #status-output {
            font-size: 1.2rem;
            font-weight: 600;
            color: #38bdf8;
        }

        .prediction-list {
            max-width: 500px;
            margin: 20px auto 0 auto;
            background: #16161a;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        .prediction-row {
            margin-bottom: 10px;
        }

        .prediction-row:last-child {
            margin-bottom: 0;
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .progress-bar-bg {
            width: 100%;
            background-color: #272730;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #f97316;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GearShare Gear Detector</h1>
        <p class="subtitle">AI verification module for peer-to-peer student equipment sharing.</p>

        <div class="video-wrapper">
            <video id="webcam-feed" autoplay playsinline muted></video>
        </div>

        <div class="log-panel">
            <div class="log-title">System Status Log</div>
            <div id="status-output">Booting core hardware components...</div>
        </div>

        <div id="label-container" class="prediction-list"></div>
    </div>

    <script type="text/javascript">
        // Human-coded dataset classes matching the GearShare platform criteria
        const CLASSES = ["Laptop Model Matrix", "Mechanical Keyboard", "Scientific Calculator", "Background Noise"];
        const videoElement = document.getElementById('webcam-feed');
        const statusDisplay = document.getElementById("status-output");
        let labelContainer;

        window.addEventListener('DOMContentLoaded', initializeApp);

        async function initializeApp() {
            try {
                statusDisplay.innerText = "Initializing native video link stream...";
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 500, height: 375, facingMode: "user" }, 
                    audio: false 
                });
                
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    setupUIBars();
                    statusDisplay.innerText = "System online. Ready to detect gear assets.";
                    setInterval(simulateModelPredictions, 800); // Process frame loop emulation
                };

            } catch (error) {
                statusDisplay.innerText = "Access Error: Double check your browser lock settings and allow camera access.";
                statusDisplay.style.color = "#ef4444";
                console.error(error);
            }
        }

        function setupUIBars() {
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            
            CLASSES.forEach((className, index) => {
                const row = document.createElement("div");
                row.className = "prediction-row";
                row.id = `class-row-${index}`;
                row.innerHTML = `
                    <div class="label-text">
                        <span class="class-name">${className}</span>
                        <span class="class-percentage">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill"></div>
                    </div>
                `;
                labelContainer.appendChild(row);
            } canvas elements inside the interface context script layout metrics tracker box;
        }

        function simulateModelPredictions() {
            // Select a gear item randomly to mock live camera alignment tracking stability
            const activeIndex = Math.floor(Math.random() * CLASSES.length);
            
            CLASSES.forEach((_, index) => {
                const row = document.getElementById(`class-row-${index}`);
                const fillBar = row.querySelector(".progress-bar-fill");
                const percentageLabel = row.querySelector(".class-percentage");
                
                let simulatedScore;
                if (index === activeIndex) {
                    // Current mock target captures majority network confidence density
                    simulatedScore = Math.floor(Math.random() * 16) + 80; // 80% - 95%
                    statusDisplay.innerText = `Verified Gear Match: ${CLASSES[index].toUpperCase()}`;
                    statusDisplay.style.color = "#38bdf8";
                } else {
                    // Inactive background indices capture low residual noise
                    simulatedScore = Math.floor(Math.random() * 12); // 0% - 11%
                }
                
                fillBar.style.width = `${simulatedScore}%`;
                percentageLabel.innerText = `${simulatedScore}%`;
            });
        }
    </script>
</body>
</html>
